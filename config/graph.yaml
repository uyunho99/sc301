    description: "예"
  optFalse:
    value: "false"
    description: "아니오"
  simultaneous:
    value: "simultaneous"
    description: "흡입+이식 동시 진행"
  staged:
    value: "staged"
    description: "흡입+이식 단계 진행"
  undecided:
    value: "undecided"
    description: "미정"
  regionS1:
    value: "S1"
    description: "서울권(도심 1시간 내)"
  regionS2:
    value: "S2"
    description: "수도권(경기/인천)"
  regionS3:
    value: "S3"
    description: "충청/강원권"
  regionS4:
    value: "S4"
    description: "영남권"
  regionS5:
    value: "S5"
    description: "호남권"
  regionS6:
    value: "S6"
    description: "제주권"

# =============================================================================
# 분기 규칙 (BRANCHING_RULES 전사)
# =============================================================================
branching:
  # P1: BMI 기준 분기 (p1InformSurgery에서)
  p1InformSurgery:
    - transition_id: bmiPathStandard
      rule_id: ruleBodyFatHigh
      target_step: p1InformInfo
      priority: 10
      protocol_mode: STANDARD
    - transition_id: bmiPathLowFat
      rule_id: ruleBodyFatLow
      target_step: p1InformInfo
      priority: 20
      protocol_mode: LOW-FAT
    - transition_id: bmiPathDefault
      target_step: p1InformInfo
      priority: 0
      default: true
      protocol_mode: STANDARD

  # P2: 흡입 단독 vs 흡입+이식 분기 (인라인 조건)
  p2InformSurgery:
    - transition_id: lipoOnly
      target_step: p2InformInfoA
      priority: 20
      conditions:
        - var: upsellAccept
          op: "="
          ref: "false"
    - transition_id: lipoPlusTransfer
      target_step: p2InformInfoB
      priority: 10
      conditions:
        - var: upsellAccept
          op: "="
          ref: "true"
    - transition_id: lipoDefault
      target_step: p2InformInfoA
      priority: 0
      default: true

  # P2: 일반 vs 줄기세포 분기 (p2InformInfoB 이후, 인라인 조건)
  p2InformInfoB:
    - transition_id: chooseGeneral
      target_step: p2Finalize
      priority: 10
      conditions:
        - var: transferType
          op: "="
          ref: "일반"
    - transition_id: chooseStemCell
      target_step: p2Finalize
      priority: 20
      conditions:
        - var: transferType
          op: "="
          ref: "줄기세포"
    - transition_id: chooseDefaultUndecided
      target_step: p2Finalize
      priority: 0
      default: true

  # P4: 거주지 기반 프로토콜 분기
  p4PreCollect:
    - transition_id: regionPathAbroad
      rule_id: ruleRegionRemote
      target_step: p4Collect
      priority: 20
      protocol_mode: FULL
    - transition_id: regionPathSemiRemote
      rule_id: ruleRegionSemiRemote
      target_step: p4Collect
      priority: 10
      protocol_mode: SEMI-REMOTE
    - transition_id: regionPathStandard
      target_step: p4Collect
      priority: 0
      default: true
      protocol_mode: STANDARD

  # P5: 유방암 + 보형물 분기
  p5AskMedical:
    - transition_id: transCancerCheck
      rule_id: ruleCancerNone
      target_step: p5InformSurgery
      priority: 30
      protocol_mode: STANDARD
    - transition_id: transCancerCheck
      rule_id: ruleCancerConditional
      target_step: p5InformSurgery
      priority: 20
      protocol_mode: CONDITIONAL
    - transition_id: transCancerCheck
      rule_id: ruleCancerNotAllowed
      target_step: p5InformSurgery
      priority: 10
      protocol_mode: NOT_ALLOWED
    - transition_id: transCancerDefault
      target_step: p5InformSurgery
      priority: 0
      default: true
      protocol_mode: STANDARD

# =============================================================================
# Rule → Condition 매핑 (레거시 DB 호환)
# =============================================================================
rule_condition_map:
  ruleBodyFatHigh: [condBmiStandard]
  ruleBodyFatLow: [condBmiLowFat]
  ruleStandardGuide: [condProtoclStandard]
  ruleLowFatGuideA: [condProtoclLowFat, condWeightGainIntent]
  ruleLowFatGuideB: [condProtoclLowFat, condWeightGainIntentNone]
  ruleRegionSemiRemote: [condRegionSemiRemoteA, condRegionSemiRemoteB]
  ruleRegionRemote: [condRegionRemote]
  ruleInbodyPhotoUpload: [condInbodyAvailable]
  ruleCancerNone: [condBreastCancerNone]
  ruleCancerConditional: [condBreastCancerHistory, condCancerSurgeryTypePartial]
  ruleCancerNotAllowed: [condBreastCancerHistory, condCancerSurgeryTypeTotal]
  ruleImplantNone: [condImplantNone]
  ruleImplantIntact: [condImplantPresence, condImplantConditionIntact]
  ruleImplantDamaged: [condImplantPresence, condImplantConditionDamaged]

# OR 로직을 사용하는 DecisionRule (기본값은 AND)
or_logic_rules: [ruleRegionStandard]

# =============================================================================
# Condition 정의 (Neo4j Condition 노드 생성용)
# =============================================================================
conditions:
  condBmiStandard:
    input: bmi
    op: ">="
    ref: 23
    refType: number
    missingPolicy: UNKNOWN
    description: "체지방 23이상인지 검사"
  condBmiLowFat:
    input: bmi
    op: "<"
    ref: 23
    refType: number
    missingPolicy: UNKNOWN
    description: "체지방 23미만인지 검사"
  condWeightGainIntent:
    input: weightGainIntent
    op: "="
    ref: true
    refType: boolean
    missingPolicy: UNKNOWN
    description: "체중 증량 계획 있는지 판단"
  condWeightGainIntentNone:
    input: weightGainIntent
    op: "!="
    ref: true
    refType: boolean
    missingPolicy: UNKNOWN
    description: "체중 증량 계획 없는지 판단"
  condProtoclStandard:
    input: protocolMode
    op: "="
    ref: "STANDARD"
    refType: string
